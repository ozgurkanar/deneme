name: Build Android APK and AAB

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-36 build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Show tool versions
        run: |
          java -version
          gradle --version
          sdkmanager --list_installed

      - name: Build debug APK and release AAB
        run: gradle --no-daemon :app:assembleDebug :app:bundleRelease --stacktrace

      - name: Upload APK and AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BuraksLongRoad-builds
          if-no-files-found: error
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
