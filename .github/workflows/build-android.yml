name: Build LibGDX Android APK and AAB

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-36 build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Verify generated assets exist
        run: |
          python3 - <<'PY'
          from pathlib import Path
          required = [
            'android/assets/images/burak_sheet.png',
            'android/assets/images/tileset.png',
            'android/assets/images/objects.png',
            'android/assets/images/enemy_doubt_sheet.png',
            'android/assets/images/bg_home.png',
            'android/assets/audio/jump.wav',
            'android/assets/audio/music_level.wav'
          ]
          missing = [p for p in required if not Path(p).exists()]
          if missing:
              raise SystemExit('Missing generated assets: ' + ', '.join(missing))
          print('Asset sanity check passed')
          PY

      - name: Build debug APK and release AAB
        run: gradle --no-daemon :android:assembleDebug :android:bundleRelease --stacktrace

      - name: Upload builds
        uses: actions/upload-artifact@v4
        with:
          name: BurakLibGDXTR-builds
          if-no-files-found: error
          path: |
            android/build/outputs/apk/debug/*.apk
            android/build/outputs/bundle/release/*.aab
